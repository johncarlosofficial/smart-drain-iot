services:

  mongo-db:
    image: mongo:4.4
    container_name: mongo-db
    ports:
      - "27017:27017"

  orion:
    image: fiware/orion:3.10.1
    platform: linux/amd64
    container_name: orion
    depends_on:
      - mongo-db
    ports:
      - "1026:1026"
    command: -dbhost mongo-db -port 1026 -logLevel DEBUG

  iot-agent:
    image: fiware/iotagent-json
    platform: linux/amd64
    container_name: iot-agent
    depends_on:
      - mongo-db
      - orion
    ports:
      - "4041:4041"
      - "7896:7896"
    environment:
      - IOTA_CB_HOST=orion
      - IOTA_CB_PORT=1026

      - IOTA_NORTH_PORT=4041
      - IOTA_HTTP_PORT=7896

      - IOTA_PROVIDER_URL=http://iot-agent:4041

      - IOTA_REGISTRY_TYPE=mongodb

      - IOTA_MONGO_HOST=mongo-db
      - IOTA_MONGO_PORT=27017
      - IOTA_MONGO_DB=iotagentjson
      - IOTA_MONGO_URI=mongodb://mongo-db:27017

  crate-db:
    image: crate:4.6.6
    platform: linux/amd64
    container_name: crate-db
    ports:
      - "4200:4200"
      - "5432:5432"

  quantumleap:
    image: fiware/quantum-leap
    platform: linux/amd64
    container_name: quantumleap
    depends_on:
      - crate-db
      - orion
    ports:
      - "8668:8668"
    environment:
      - CRATE_HOST=crate-db

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - crate-db
