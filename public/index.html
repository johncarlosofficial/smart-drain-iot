<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Drain Monitoring</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <header class="bg-gray-800 border-b border-cyan-500/30 p-6 shadow-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-black tracking-wider text-cyan-400 uppercase">⚡ Smart Drain Monitoring</h1>
            <nav class="flex flex-wrap gap-2 bg-gray-950 p-1.5 rounded-lg border border-gray-700">
                <button onclick="switchTab('dashboard')" id="btn-dashboard" class="px-4 py-2 rounded-md font-medium text-sm transition-all bg-cyan-600 text-white">Dashboard</button>
                <button onclick="switchTab('cadastro')" id="btn-cadastro" class="px-4 py-2 rounded-md font-medium text-sm transition-all text-gray-400 hover:text-white">Cadastrar</button>
                <button onclick="switchTab('editar')" id="btn-editar" class="hidden px-4 py-2 rounded-md font-medium text-sm transition-all text-gray-400 hover:text-white">Editar</button>
                <button onclick="switchTab('simulacao')" id="btn-simulacao" class="px-4 py-2 rounded-md font-medium text-sm transition-all text-gray-400 hover:text-white">Simulação</button>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        
        <section id="tab-dashboard" class="tab-content block space-y-6">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-md flex justify-between items-center">
                <div>
                    <p class="text-sm text-gray-400 uppercase font-bold tracking-wider">Total Monitorado</p>
                    <h2 class="text-4xl font-extrabold text-white mt-1" id="total-count">0 <span class="text-lg text-gray-500 font-normal">Bueiros</span></h2>
                </div>
                <button onclick="switchTab('cadastro')" class="bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 px-5 py-3 rounded-lg font-bold shadow-lg shadow-cyan-500/20 transition-all transform hover:-translate-y-0.5">[ + ] Criar Bueiro</button>
            </div>
            <div id="devices-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="tab-cadastro" class="tab-content hidden max-w-xl mx-auto bg-gray-800 p-8 rounded-xl border border-gray-700 shadow-xl">
            <h2 class="text-xl font-bold border-b border-gray-700 pb-4 mb-6 text-cyan-400">Cadastro de Novo Bueiro</h2>
            <form id="form-cadastro" class="space-y-4" onsubmit="registerDevice(event)">
                <div>
                    <label class="block text-xs uppercase tracking-wider font-bold text-gray-400 mb-2">ID do dispositivo</label>
                    <input type="text" id="cad-id" placeholder="Ex: manhole001" class="w-full bg-gray-950 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-cyan-500" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs uppercase tracking-wider font-bold text-gray-400 mb-2">Latitude</label>
                        <input type="number" step="any" min="-90" max="90" id="cad-lat" placeholder="-5.7945" class="w-full bg-gray-950 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-cyan-500" required>
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-wider font-bold text-gray-400 mb-2">Longitude</label>
                        <input type="number" step="any" min="-180" max="180" id="cad-lng" placeholder="-35.2110" class="w-full bg-gray-950 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-cyan-500" required>
                    </div>
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wider font-bold text-gray-400 mb-2">Data da última manutenção</label>
                    <input type="date" id="cad-date" class="w-full bg-gray-950 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-cyan-500">
                </div>
                <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-700 py-3 rounded-lg font-bold transition-colors mt-2">Cadastrar Bueiro</button>
            </form>
        </section>

        <section id="tab-editar" class="tab-content hidden max-w-xl mx-auto bg-gray-800 p-8 rounded-xl border border-gray-700 shadow-xl">
            <h2 class="text-xl font-bold border-b border-gray-700 pb-4 mb-6 text-emerald-400">Editar Bueiro</h2>
            <form id="form-editar" class="space-y-4" onsubmit="updateDevice(event)">
                <input type="hidden" id="edit-old-id">
                <div>
                    <label class="block text-xs uppercase tracking-wider font-bold text-gray-400 mb-2">ID do dispositivo</label>
                    <input type="text" id="edit-id" class="w-full bg-gray-950 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs uppercase tracking-wider font-bold text-gray-400 mb-2">Latitude</label>
                        <input type="number" step="any" min="-90" max="90" id="edit-lat" class="w-full bg-gray-950 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500" required>
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-wider font-bold text-gray-400 mb-2">Longitude</label>
                        <input type="number" step="any" min="-180" max="180" id="edit-lng" class="w-full bg-gray-950 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500" required>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs uppercase tracking-wider font-bold text-gray-400 mb-2">Nível de Água (%)</label>
                        <input type="number" min="0" max="100" id="edit-wl" class="w-full bg-gray-950 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500" required>
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-wider font-bold text-gray-400 mb-2">Status Tampa</label>
                        <select id="edit-cs" class="w-full bg-gray-950 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500">
                            <option value="closed">Fechada</option>
                            <option value="open">Aberta</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wider font-bold text-gray-400 mb-2">Data da última manutenção</label>
                    <input type="date" id="edit-date" class="w-full bg-gray-950 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-emerald-500">
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 py-3 rounded-lg font-bold transition-colors mt-2">Salvar Alterações</button>
            </form>
            <button onclick="deleteDevice()" class="w-full bg-rose-600 hover:bg-rose-700 py-3 rounded-lg font-bold transition-colors mt-4 shadow-lg shadow-rose-500/20 text-white">Excluir Bueiro</button>
        </section>

        <section id="tab-simulacao" class="tab-content hidden max-w-xl mx-auto bg-gray-800 p-8 rounded-xl border border-gray-700 shadow-xl">
            <h2 class="text-xl font-bold border-b border-gray-700 pb-4 mb-6 text-cyan-400">Simulação Automática</h2>
            <form id="form-simulacao" class="space-y-4" onsubmit="toggleSimulationForm(event)">
                <div>
                    <label class="block text-xs uppercase tracking-wider font-bold text-gray-400 mb-2">Selecione o Bueiro</label>
                    <select id="sim-id" class="w-full bg-gray-950 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-cyan-500 device-dropdown" required></select>
                </div>
                <div class="flex items-center bg-gray-950 p-4 border border-gray-700 rounded-lg">
                    <input type="checkbox" id="sim-rain" class="w-4 h-4 text-cyan-600 bg-gray-900 border-gray-700 rounded focus:ring-0" checked>
                    <label for="sim-rain" class="ml-3 font-medium text-gray-300">Simular fluxo de chuva constante</label>
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wider font-bold text-gray-400 mb-2">Velocidade da Atualização</label>
                    <div class="grid grid-cols-3 gap-2 bg-gray-950 p-2 border border-gray-700 rounded-lg">
                        <label class="flex items-center justify-center p-2 rounded border border-gray-800 cursor-pointer hover:bg-gray-900">
                            <input type="radio" name="sim-speed" value="lenta" class="sr-only peer">
                            <span class="text-gray-400 peer-checked:text-cyan-400 font-bold text-sm">Lenta</span>
                        </label>
                        <label class="flex items-center justify-center p-2 rounded border border-gray-800 cursor-pointer hover:bg-gray-900">
                            <input type="radio" name="sim-speed" value="media" class="sr-only peer" checked>
                            <span class="text-gray-400 peer-checked:text-cyan-400 font-bold text-sm">Média</span>
                        </label>
                        <label class="flex items-center justify-center p-2 rounded border border-gray-800 cursor-pointer hover:bg-gray-900">
                            <input type="radio" name="sim-speed" value="rapida" class="sr-only peer">
                            <span class="text-gray-400 peer-checked:text-cyan-400 font-bold text-sm">Rápida</span>
                        </label>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 pt-2">
                    <button type="submit" id="btn-sim-start" class="bg-emerald-600 hover:bg-emerald-700 py-3 rounded-lg font-bold transition-colors">Iniciar</button>
                    <button type="button" onclick="stopSimulationFromForm()" class="bg-rose-600 hover:bg-rose-700 py-3 rounded-lg font-bold transition-colors">Parar</button>
                </div>
            </form>
        </section>

    </main>

    <script>
        const API_BASE = 'http://localhost:3080/api';
        let currentDevices = [];

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.replace('block', 'hidden'));
            document.getElementById(`tab-${tabName}`).classList.replace('hidden', 'block');
            
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('bg-cyan-600', 'text-white'));
            
            const btnEditar = document.getElementById('btn-editar');
            if(tabName === 'editar') {
                btnEditar.classList.remove('hidden');
                btnEditar.classList.add('bg-cyan-600', 'text-white');
            } else {
                btnEditar.classList.add('hidden');
                document.getElementById(`btn-${tabName}`).classList.add('bg-cyan-600', 'text-white');
            }

            if(tabName === 'dashboard' || tabName === 'simulacao') {
                loadDevices();
            }
        }

        async function loadDevices() {
            try {
                const response = await axios.get(`${API_BASE}/devices`);
                currentDevices = response.data;
                
                document.getElementById('total-count').innerHTML = `${currentDevices.length} <span class="text-lg text-gray-500 font-normal">Bueiros</span>`;

                const container = document.getElementById('devices-list');
                container.innerHTML = currentDevices.length === 0 
                    ? `<div class="col-span-full text-center py-12 text-gray-500">Nenhum bueiro cadastrado. Acesse a aba de cadastro.</div>`
                    : '';

                document.querySelectorAll('.device-dropdown').forEach(dropdown => {
                    const savedVal = dropdown.value;
                    dropdown.innerHTML = currentDevices.map(d => `<option value="${d.deviceId}">${d.deviceId}</option>`).join('');
                    if(savedVal) dropdown.value = savedVal;
                });

                currentDevices.forEach(d => {
                    // Novas Faixas de Estado + Status de "Enchente" (100%)
                    let statusText = 'NORMAL';
                    let statusClass = 'bg-emerald-500/10 text-emerald-400 border-emerald-500/30';
                    
                    if (d.waterLevel >= 60 && d.waterLevel <= 79) {
                        statusText = 'ATENÇÃO';
                        statusClass = 'bg-amber-500/10 text-amber-400 border-amber-500/30';
                    } else if (d.waterLevel >= 80 && d.waterLevel < 100) {
                        statusText = 'RISCO DE ENCHENTE';
                        statusClass = 'bg-orange-500/10 text-orange-400 border-orange-500/30';
                    } else if (d.waterLevel >= 100) {
                        statusText = 'ENCHENTE';
                        statusClass = 'bg-rose-500/20 text-rose-500 border-rose-500/50 animate-pulse';
                    }

                    const simStatusText = d.isSimulating ? 'Simulação Ativa' : 'Inativa';
                    const simStatusClass = d.isSimulating ? 'text-emerald-400' : 'text-gray-500';

                    // Fechar tampa (se aberta)
                    const closeCoverBtn = d.coverStatus === 'open' 
                        ? `<button onclick="closeCover('${d.deviceId}')" class="col-span-2 bg-amber-500/20 text-amber-400 hover:bg-amber-500/30 text-[10px] uppercase py-2.5 px-1 rounded font-bold border border-amber-500/30 transition-colors text-center mt-1">🔒 Fechar Tampa</button>` 
                        : '';

                    // Botão Condicional: Desaparece se "isDraining" for verdadeiro
                    const drainBtn = (d.waterLevel >= 100 && !d.isDraining) 
                        ? `<button onclick="sendToLagoon('${d.deviceId}')" class="col-span-2 bg-purple-600/30 text-purple-400 hover:bg-purple-600/50 text-[10px] uppercase py-2.5 px-1 rounded font-bold border border-purple-500/40 transition-colors text-center mt-1 animate-pulse">💧 Enviar para Lagoa</button>` 
                        : '';
                    
                    const card = `
                        <div class="bg-gray-800 rounded-xl p-6 border border-gray-700 flex flex-col justify-between shadow-lg hover:border-gray-600 transition-all">
                            <div>
                                <div class="flex justify-between items-start mb-4">
                                    <div>
                                        <h3 class="text-lg font-bold text-white">ID: ${d.deviceId}</h3>
                                        <p class="text-xs text-gray-500 mt-1">Status motor: <span class="${simStatusClass}">${simStatusText}</span></p>
                                    </div>
                                    <span class="px-3 py-1 text-xs font-black rounded-full border ${statusClass} text-center">${statusText}</span>
                                </div>
                                <div class="space-y-2 my-4 bg-gray-950 p-4 rounded-lg border border-gray-800">
                                    <div class="flex justify-between text-sm"><span class="text-gray-400">Nível Atual:</span> <span class="font-bold text-white">${d.waterLevel}%</span></div>
                                    <div class="w-full bg-gray-800 h-2 rounded-full overflow-hidden"><div class="bg-cyan-500 h-full transition-all duration-500" style="width: ${d.waterLevel}%"></div></div>
                                    <div class="flex justify-between text-sm pt-2"><span class="text-gray-400">Tampa:</span> <span class="font-mono text-white">${d.coverStatus === 'open' ? 'ABERTA ⚠️' : 'FECHADA'}</span></div>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-2 mt-2 pt-4 border-t border-gray-700/50">
                                <button onclick="openEditScreen('${d.deviceId}')" class="bg-blue-600/20 text-blue-400 hover:bg-blue-600/30 text-[10px] uppercase py-2 px-1 rounded font-bold transition-colors">Editar</button>
                                <button onclick="quickToggleSimulation('${d.deviceId}', ${d.isSimulating})" class="${d.isSimulating ? 'bg-rose-600/20 text-rose-400 hover:bg-rose-600/30' : 'bg-emerald-600/20 text-emerald-400 hover:bg-emerald-600/30'} text-[10px] uppercase py-2 px-1 rounded font-bold transition-colors">
                                    ${d.isSimulating ? 'Parar Simulação' : 'Iniciar Simulação'}
                                </button>
                                ${closeCoverBtn}
                                ${drainBtn}
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            } catch (error) {
                console.error('Erro ao processar atualização da lista:', error);
            }
        }

        async function registerDevice(e) {
            e.preventDefault();
            const payload = {
                deviceId: document.getElementById('cad-id').value,
                latitude: document.getElementById('cad-lat').value,
                longitude: document.getElementById('cad-lng').value,
                lastMaintenance: document.getElementById('cad-date').value
            };
            try {
                await axios.post(`${API_BASE}/devices`, payload);
                alert('Bueiro registrado com sucesso!');
                document.getElementById('form-cadastro').reset();
                switchTab('dashboard');
            } catch (err) {
                alert('Falha no cadastro: ' + (err.response?.data?.error || err.message));
            }
        }

        function openEditScreen(deviceId) {
            const device = currentDevices.find(d => d.deviceId === deviceId);
            if(!device) return alert('Dispositivo não encontrado em cache.');

            switchTab('editar');
            document.getElementById('edit-old-id').value = device.deviceId;
            document.getElementById('edit-id').value = device.deviceId;
            
            if (device.location && device.location.coordinates) {
                document.getElementById('edit-lng').value = device.location.coordinates[0];
                document.getElementById('edit-lat').value = device.location.coordinates[1];
            }

            document.getElementById('edit-wl').value = device.waterLevel;
            document.getElementById('edit-cs').value = device.coverStatus;
            
            if (device.lastMaintenance && device.lastMaintenance !== 'N/A') {
                document.getElementById('edit-date').value = new Date(device.lastMaintenance).toISOString().split('T')[0];
            } else {
                document.getElementById('edit-date').value = '';
            }
        }

        async function updateDevice(e) {
            e.preventDefault();
            const oldId = document.getElementById('edit-old-id').value;
            const payload = {
                deviceId: document.getElementById('edit-id').value,
                latitude: document.getElementById('edit-lat').value,
                longitude: document.getElementById('edit-lng').value,
                waterLevel: document.getElementById('edit-wl').value,
                coverStatus: document.getElementById('edit-cs').value,
                lastMaintenance: document.getElementById('edit-date').value
            };
            try {
                await axios.put(`${API_BASE}/devices/${oldId}`, payload);
                alert('Bueiro atualizado com sucesso!');
                switchTab('dashboard');
            } catch (err) {
                alert('Falha na atualização: ' + (err.response?.data?.error || err.message));
            }
        }

        async function closeCover(deviceId) {
            try {
                await axios.post(`${API_BASE}/devices/${deviceId}/close-cover`);
                loadDevices();
            } catch (err) {
                alert('Erro ao fechar a tampa: ' + (err.response?.data?.error || err.message));
            }
        }

        async function sendToLagoon(deviceId) {
            // Atualização otimista: esconde o botão imediatamente antes mesmo da requisição terminar
            const device = currentDevices.find(d => d.deviceId === deviceId);
            if (device) device.isDraining = true;
            loadDevices(); 

            try {
                await axios.post(`${API_BASE}/devices/${deviceId}/drain`);
            } catch (err) {
                alert('Erro ao iniciar escoamento: ' + err.message);
                // Se der erro, desfaz a ocultação otimista
                if (device) device.isDraining = false; 
                loadDevices();
            }
        }

        async function quickToggleSimulation(id, isActive) {
            try {
                const endpoint = isActive ? 'stop' : 'start';
                const payload = isActive ? { deviceId: id } : { deviceId: id, simulateRain: true, speed: 'media' };
                await axios.post(`${API_BASE}/simulate/auto/${endpoint}`, payload);
                loadDevices();
            } catch (err) {
                alert('Erro ao alterar estado da simulação: ' + err.message);
            }
        }

        async function toggleSimulationForm(e) {
            e.preventDefault();
            const id = document.getElementById('sim-id').value;
            const payload = {
                deviceId: id,
                simulateRain: document.getElementById('sim-rain').checked,
                speed: document.querySelector('input[name="sim-speed"]:checked').value
            };
            try {
                await axios.post(`${API_BASE}/simulate/auto/start`, payload);
                alert(`Simulação iniciada para o dispositivo ${id}`);
                switchTab('dashboard');
            } catch (err) {
                alert(err.response?.data?.error || err.message);
            }
        }

        async function stopSimulationFromForm() {
            const id = document.getElementById('sim-id').value;
            try {
                await axios.post(`${API_BASE}/simulate/auto/stop`, { deviceId: id });
                alert(`Simulação encerrada para o dispositivo ${id}`);
                switchTab('dashboard');
            } catch (err) {
                alert(err.response?.data?.error || err.message);
            }
        }

        async function deleteDevice() {
            // Pega o ID antigo, pois é a referência mais segura caso o usuário tenha digitado algo no input de ID
            const targetId = document.getElementById('edit-old-id').value;

            if (!targetId) {
                return alert('Nenhum dispositivo selecionado para exclusão.');
            }

            const confirmacao = confirm(`⚠️ Atenção!\nTem certeza que deseja excluir permanentemente o bueiro "${targetId}"?`);
            
            if (!confirmacao) return;

            try {
                await axios.delete(`${API_BASE}/devices/${targetId}`);
                alert('Bueiro excluído com sucesso!');
                switchTab('dashboard'); // Volta para o painel principal e recarrega os dados
            } catch (err) {
                alert('Falha na exclusão: ' + (err.response?.data?.error || err.message));
            }
        }

        setInterval(() => {
            if (document.getElementById('tab-dashboard').classList.contains('block')) {
                loadDevices();
            }
        }, 2000);

        window.onload = () => loadDevices();
    </script>
</body>
</html>
